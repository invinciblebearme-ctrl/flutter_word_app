name: word_challenge_flutter
description: "오늘의 영단어 웹앱을 Flutter로 변환한 스타터."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

# Flutter 3.35.1 compatible constraints
dependencies:
  flutter:
    sdk: flutter
  flutter_tts: ^4.2.3
  webview_flutter: ^4.10.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/indexList.json
    - assets/words/words01.json
    - assets/images/
    - assets/data/words.json
    - assets/data/indexList.json
