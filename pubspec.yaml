name: word_challenge_flutter
description: "오늘의 영단어 ."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

# Flutter 3.35.1 compatible constraints
dependencies:
  flutter:
    sdk: flutter
  flutter_tts: ^4.2.3
  webview_flutter: ^4.10.0
  provider: ^6.1.2
  speech_to_text: ^7.3.0
  permission_handler: ^12.0.1
  flutter_native_splash: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1


flutter:
  uses-material-design: true
  assets:
    - assets/indexList.json
    - assets/words/words01.json
    - assets/data/words.json
    - assets/data/words_800_rounds.json
    - assets/data/indexList.json
    - assets/logo.png
    - assets/logo4.png
    - assets/icon.png

flutter_native_splash:

  # 공통
  color: "#000000"                  # 밝은 테마 배경색
  color_dark: "#000000"             # 다크 테마 배경색
  image: assets/logo4.png     # 중앙 로고 (라이트)
  #image_dark: assets/logo.png  # 중앙 로고 (다크, 선택)

  # (선택) 하단 작은 로고/문구
  #branding: assets/logo.png
  #branding_mode: bottom  # 혹은 bottomRight

  # 전체화면(상태바 숨김)
  fullscreen: true

  # 안드로이드 12 이상 전용 설정(반드시 별도 지정 필요)
  android_12:
    color: "#000000"
    color_dark: "#000000"
    image: assets/logo4.png     # 중앙 로고 (라이트)
    #image_dark: assets/logo.png
    #branding: assets/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21 # 안드로이드 최소 SDK 버전